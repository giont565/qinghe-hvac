<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

<style>
  :root { --ink:#f5f5f7; --sub:#86868b; --sensor:#A3E635; --actuator:#FB923C; --rope:#00D4FF; --safety:#F472B6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; background:#050505; color:var(--ink); font-family:-apple-system, "SF Pro Display", "Noto Sans TC", sans-serif; }
  canvas { display:block; }
  #viewport { position:fixed; inset:0; }

  /* Nav */
  .site-nav { position:fixed; top:0; left:0; right:0; z-index:200; height:46px; display:flex; align-items:center; justify-content:space-between; padding:0 18px; background:rgba(10,11,14,.82); backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,.06); font-size:12px; }
  .site-brand { display:flex; align-items:center; gap:8px; color:var(--ink); text-decoration:none; font-weight:600; }
  .brand-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:linear-gradient(135deg,#a3e635,#00d4ff); box-shadow:0 0 8px rgba(163,230,53,.5); }
  .site-sys { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; margin-left:10px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:6px; font-size:11px; color:var(--sub); }
  .site-sys select { background:transparent; border:none; color:var(--ink); font-size:12px; font-family:inherit; cursor:pointer; }
  .site-sys option { background:#1a1d24; color:var(--ink); }
  .site-tabs { display:flex; gap:4px; padding:3px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:9px; flex-wrap:wrap; }
  .site-tabs a { padding:6px 12px; border-radius:6px; color:#86868b; text-decoration:none; font-size:12px; display:flex; align-items:center; gap:6px; }
  .site-tabs a:hover { background:rgba(255,255,255,.06); color:var(--ink); }
  .site-tabs a.is-active { background:rgba(163,230,53,.14); color:#a3e635; border:1px solid rgba(163,230,53,.3); }
  @media (max-width:768px){ .site-nav{padding:0 8px;height:42px;font-size:11px} .site-brand span:last-child{display:none} }

  /* HUD */
  .hud { position:fixed; z-index:10; background:rgba(15,15,17,.78); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:14px 18px; font-size:13px; }
  .hud-tl { top:60px; left:16px; max-width:300px; }
  .hud-tr { top:60px; right:16px; min-width:280px; }
  .hud-bl { bottom:16px; left:16px; }
  .hud-br { bottom:16px; right:16px; min-width:240px; }
  h1 { font-size:18px; font-weight:600; letter-spacing:-.01em; margin-bottom:4px; }
  .sub { color:var(--sub); font-size:11px; letter-spacing:.15em; text-transform:uppercase; }
  .controls { display:grid; gap:6px; margin-top:12px; }
  .ctrl-btn { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; font-size:12px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:7px; color:var(--ink); cursor:pointer; transition:background .2s, border-color .2s; font-family:inherit; }
  .ctrl-btn:hover { background:rgba(255,255,255,.09); }
  .ctrl-btn.active { background:rgba(163,230,53,.12); border-color:rgba(163,230,53,.4); }
  .key { color:var(--sub); font-family:"SF Mono", monospace; font-size:10px; }
  .info { font-size:11px; line-height:1.6; color:var(--sub); }
  .info b { color:var(--ink); }
  kbd { display:inline-block; padding:1px 5px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:3px; color:var(--ink); font-family:inherit; font-size:10px; }

  /* 呼叫按鈕 + 樓層狀態 */
  .floor-call { display:flex; flex-direction:column; gap:6px; margin-top:12px; }
  .floor-row { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:7px; }
  .floor-row.is-current { background:rgba(163,230,53,.16); border-color:rgba(163,230,53,.5); }
  .floor-row .lbl { font-size:13px; font-weight:600; }
  .floor-call-btn { padding:4px 10px; background:rgba(251,191,36,.12); border:1px solid rgba(251,191,36,.4); border-radius:5px; color:#fbbf24; font-size:11px; cursor:pointer; font-family:inherit; }
  .floor-call-btn:hover { background:rgba(251,191,36,.22); }
  .floor-call-btn:disabled { opacity:.3; cursor:not-allowed; }
  .floor-call-btn.is-calling { background:rgba(251,191,36,.4); color:#fff; }

  .car-disp { display:flex; align-items:center; gap:10px; padding:10px 14px; background:#0a0d12; border:1px solid #2a2e36; border-radius:7px; margin-top:8px; }
  .car-disp .lcd { background:#0a3030; color:#a3e635; padding:4px 10px; border-radius:4px; font-family:"SF Mono",monospace; font-size:14px; font-weight:700; min-width:50px; text-align:center; box-shadow:inset 0 0 4px rgba(163,230,53,.4); }
  .car-disp .arrow { color:var(--sensor); font-size:18px; }
  .car-disp .arrow.idle { color:#444; }
  .car-status { font-size:11px; color:var(--sub); }
  .car-status.running { color:#fbbf24; }
  .car-status.opening, .car-status.closing { color:#00d4ff; }
  .car-status.idle { color:var(--sensor); }

  #selected { position:fixed; left:16px; bottom:80px; z-index:10; background:rgba(15,15,17,.85); backdrop-filter:blur(20px); border:1px solid rgba(163,230,53,.3); border-radius:12px; padding:14px 18px; min-width:240px; max-width:280px; font-size:12px; opacity:0; transition:opacity .25s; pointer-events:none; }
  #selected.show { opacity:1; }
  #selected h3 { font-size:14px; font-weight:600; margin-bottom:6px; color:var(--sensor); }
  #selected .row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px dashed rgba(255,255,255,.08); }
  #selected .row .k { color:var(--sub); }
  #selected .row .v { font-family:"SF Mono", monospace; }

  @media (max-width:900px){
    .hud-tr { left:16px; right:16px; top:60px; min-width:0; max-height:60vh; overflow-y:auto; }
    .hud-tl { display:none; }
    .hud-bl, .hud-br { display:none; }
    #selected { left:16px; right:16px; bottom:16px; top:auto; max-width:none; }
  }
</style>
</head>

<canvas id="viewport"></canvas>

<div id="loader" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#050505;color:#f5f5f7;z-index:100;text-align:center;padding:24px">
  <div>
    <div style="font-size:24px;font-weight:600;margin-bottom:12px">🛗 載入電梯 3D 模型中</div>
    <div id="loaderMsg" style="color:#86868b;font-size:13px">正在從 CDN 載入 Three.js…</div>
    <div id="loaderErr" style="color:#fb923c;font-size:12px;margin-top:16px;max-width:520px;display:none;font-family:SF Mono,monospace;text-align:left;white-space:pre-wrap"></div>
  </div>
</div>
<script>
window.addEventListener('error', e => {
  const err = document.getElementById('loaderErr');
  if (err) {
    err.style.display = 'block';
    err.textContent = '⚠ ' + (e.message || 'unknown') + (e.filename ? '\n@ ' + e.filename + ':' + e.lineno : '');
    document.getElementById('loaderMsg').textContent = '⚠ 載入失敗';
  }
});
window.addEventListener('unhandledrejection', e => {
  const err = document.getElementById('loaderErr');
  if (err) {
    err.style.display = 'block';
    err.textContent = '⚠ Promise rejected: ' + (e.reason?.message || e.reason);
  }
});
</script>

<div class="hud hud-tl">
  <p class="sub">B 棟 · 客梯 · ELEV-01</p>
  <h1>Elevator · 互動模型</h1>
  <p class="info" style="margin-top:6px">4-stop MRL traction lift · 13 人 / 900 kg / 1.0 m/s</p>
  <div class="car-disp">
    <div class="lcd" id="floorLCD">1F</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ Scene Setup ============
const canvas = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050505);
scene.fog = new THREE.Fog(0x050505, 28, 60);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(10, 7, 12);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.06;
controls.minDistance = 3; controls.maxDistance = 40;
controls.target.set(0, 6, 0);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const keyL = new THREE.DirectionalLight(0xffffff, 1.05); keyL.position.set(10, 20, 12); keyL.castShadow = true;
keyL.shadow.mapSize.set(2048, 2048);
keyL.shadow.camera.left=-14; keyL.shadow.camera.right=14; keyL.shadow.camera.top=18; keyL.shadow.camera.bottom=-4;
keyL.shadow.bias = -0.0008;
scene.add(keyL);
scene.add(Object.assign(new THREE.DirectionalLight(0xb0c4de, 0.38), { position: new THREE.Vector3(-10, 6, -4) }));
scene.add(Object.assign(new THREE.DirectionalLight(0xa3e635, 0.32), { position: new THREE.Vector3(0, 6, -14) }));

// Ground + grid
const ground = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.95 }));
ground.rotation.x = -Math.PI/2; ground.position.y = -1.55; ground.receiveShadow = true;
scene.add(ground);
scene.add(Object.assign(new THREE.GridHelper(60, 60, 0x222, 0x161616), { position: new THREE.Vector3(0, -1.54, 0) }));

// ============ Dimensions ============
const FLOOR_H = 3.5;
const FLOORS = 4;
const FLOOR_NAMES = ['1F', '2F', '3F', 'RF'];
const FLOOR_Y = FLOOR_NAMES.map((_, i) => i * FLOOR_H);  // 樓層 Y 平面
const SHAFT_W = 2.2;
const SHAFT_D = 2.4;
const PIT_H = 1.5;
const SHAFT_H = FLOOR_H * (FLOORS - 1) + 3.5 + PIT_H;
const CAB_W = 1.6, CAB_D = 1.6, CAB_H = 2.3;
const CAB_FLOOR_OFFSET = 0.05;  // cab floor 相對於樓層 Y

const ELEV = new THREE.Group(); scene.add(ELEV);
ELEV.position.y = 0;  // 基準 y=0 對應 1F floor

// ============ 1. Hoistway 殼 ============
const matShaft = new THREE.MeshStandardMaterial({ color: 0xc8cdd4, roughness: 0.7, metalness: 0.2, transparent: true, opacity: 0.12, side: THREE.DoubleSide });
const shaftGroup = new THREE.Group();
// 4 面牆獨立做（為了 cutaway 可隱前牆）
const wallSpec = [
  { w: SHAFT_W, h: SHAFT_H, x: 0, y: SHAFT_H/2 - PIT_H, z: -SHAFT_D/2, key:'back' },
  { w: SHAFT_D, h: SHAFT_H, x: -SHAFT_W/2, y: SHAFT_H/2 - PIT_H, z: 0, rotY: Math.PI/2, key:'left' },
  { w: SHAFT_D, h: SHAFT_H, x: SHAFT_W/2, y: SHAFT_H/2 - PIT_H, z: 0, rotY: Math.PI/2, key:'right' },
  { w: SHAFT_W, h: SHAFT_H, x: 0, y: SHAFT_H/2 - PIT_H, z: SHAFT_D/2, key:'front' },
];
const walls = {};
wallSpec.forEach(s => {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(s.w, s.h), matShaft);
  m.position.set(s.x, s.y, s.z);
  if (s.rotY) m.rotation.y = s.rotY;
  m.userData = { name:"Hoistway Wall", kind:"shaft", desc:`井道牆面 (${s.key})`, specs:[["材質","RC + 2hr 防火"],["厚度","200 mm"]] };
  walls[s.key] = m;
  shaftGroup.add(m);
});
// Wireframe of bounding box
const shaftEdges = new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.BoxGeometry(SHAFT_W, SHAFT_H, SHAFT_D)),
  new THREE.LineBasicMaterial({ color: 0xf5f5f7 })
);
shaftEdges.position.set(0, SHAFT_H/2 - PIT_H, 0);
shaftGroup.add(shaftEdges);
ELEV.add(shaftGroup);

// 樓層線 + 樓層號牌
FLOOR_Y.forEach((y, i) => {
  const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-SHAFT_W/2-0.4, y, SHAFT_D/2+0.05),
    new THREE.Vector3(SHAFT_W/2+0.4, y, SHAFT_D/2+0.05)
  ]), new THREE.LineBasicMaterial({ color: 0x666 }));
  ELEV.add(line);
  // 號牌
  const cv = document.createElement('canvas'); cv.width=128; cv.height=64;
  const cx = cv.getContext('2d');
  cx.fillStyle='rgba(15,15,17,.92)'; cx.fillRect(0,0,128,64);
  cx.strokeStyle='#a3e635'; cx.lineWidth=2; cx.strokeRect(2,2,124,60);
  cx.fillStyle='#a3e635'; cx.font='bold 30px sans-serif'; cx.textAlign='center';
  cx.fillText(FLOOR_NAMES[i], 64, 44);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv) }));
  sprite.scale.set(0.55, 0.28, 1);
  sprite.position.set(-SHAFT_W/2 - 0.55, y + 1.1, SHAFT_D/2 + 0.06);
  ELEV.add(sprite);
});

// Pit 底板
const pitFloor = new THREE.Mesh(new THREE.BoxGeometry(SHAFT_W*0.98, 0.25, SHAFT_D*0.98),
  new THREE.MeshStandardMaterial({ color: 0x3a414d, roughness: 0.9 }));
pitFloor.position.set(0, -PIT_H + 0.12, 0);
pitFloor.receiveShadow = true;
pitFloor.userData = { name:"Pit Floor 緩衝坑底", kind:"pit", desc:"井道底部 RC 結構 + 排水孔", specs:[["深度","1.5 m"],["排水","Φ75 落水"]] };
ELEV.add(pitFloor);

// Pit 梯子
const ladder = new THREE.Group();
const ladderSide = new THREE.MeshStandardMaterial({ color: 0xfbbf24, metalness: 0.6, roughness: 0.5 });
[-0.15, 0.15].forEach(dx => {
  const r = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, PIT_H + 0.2, 8), ladderSide);
  r.position.set(SHAFT_W/2 - 0.12, -PIT_H/2 + 0.1, dx + 0.7);
  ladder.add(r);
});
for (let i = 0; i < 5; i++) {
  const rung = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.3, 8), ladderSide);
  rung.rotation.x = Math.PI/2;
  rung.position.set(SHAFT_W/2 - 0.12, -PIT_H + 0.4 + i*0.3, 0.7);
  ladder.add(rung);
}
ELEV.add(ladder);

// ============ 2. Guide Rails 導軌 (4 條，含軌座) ============
const railMat = new THREE.MeshStandardMaterial({ color: 0x9aa0a8, metalness: 0.85, roughness: 0.3 });
const railsBrkMat = new THREE.MeshStandardMaterial({ color: 0x4a5160, metalness: 0.7, roughness: 0.5 });
// 轎廂左右導軌
[-SHAFT_W/2+0.15, SHAFT_W/2-0.15].forEach(x => {
  const rail = new THREE.Mesh(new THREE.BoxGeometry(0.09, SHAFT_H, 0.13), railMat);
  rail.position.set(x, SHAFT_H/2 - PIT_H, -0.25);
  rail.castShadow = true;
  rail.userData = { name:"Cab Guide Rail 轎廂導軌", kind:"rail", desc:"T 型鋼導軌 T90/B", specs:[["截面","T90/B"],["材質","冷拉精軋鋼"],["軌距","2,200 mm"]] };
  ELEV.add(rail);
  // 軌座 (每樓層一個)
  FLOOR_Y.forEach(y => {
    const brk = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.15, 0.18), railsBrkMat);
    brk.position.set(x + (x > 0 ? -0.07 : 0.07), y, -0.25);
    ELEV.add(brk);
  });
});
// 配重導軌
[-0.25, 0.25].forEach(x => {
  const rail = new THREE.Mesh(new THREE.BoxGeometry(0.07, SHAFT_H, 0.11), railMat);
  rail.position.set(x, SHAFT_H/2 - PIT_H, -SHAFT_D/2 + 0.3);
  rail.castShadow = true;
  rail.userData = { name:"CW Guide Rail 配重導軌", kind:"rail", desc:"配重 T 型導軌 T70/B", specs:[["截面","T70/B"]] };
  ELEV.add(rail);
});

// ============ 3. Cab 轎廂（內部裝飾、扶手、燈、操作板）============
const cabGroup = new THREE.Group();
let cabFloor = 0;       // 當前所在樓層 (0~3)
let cabTargetY = FLOOR_Y[0] + CAB_FLOOR_OFFSET;
cabGroup.position.set(0, cabTargetY, -0.25);

// 外殼框架 (4 個牆 + 頂 + 底)
const matCabExt = new THREE.MeshStandardMaterial({ color: 0xc8cdd4, metalness: 0.75, roughness: 0.35 });
const matCabInt = new THREE.MeshStandardMaterial({ color: 0xf3f4f6, metalness: 0.3, roughness: 0.6 });
// 底板
const cabFloorMesh = new THREE.Mesh(new THREE.BoxGeometry(CAB_W, 0.06, CAB_D),
  new THREE.MeshStandardMaterial({ color: 0x6a6e76, metalness: 0.6, roughness: 0.5 }));
cabFloorMesh.position.y = -CAB_H/2 + 0.03;
cabFloorMesh.castShadow = true; cabFloorMesh.receiveShadow = true;
cabGroup.add(cabFloorMesh);
// 內部地板紋路（馬賽克）
for (let i = -3; i <= 3; i++) {
  for (let j = -3; j <= 3; j++) {
    if ((i+j) % 2 === 0) {
      const tile = new THREE.Mesh(new THREE.PlaneGeometry(0.22, 0.22),
        new THREE.MeshStandardMaterial({ color: 0x8a8e96, roughness: 0.6 }));
      tile.rotation.x = -Math.PI/2;
      tile.position.set(i*0.22, -CAB_H/2 + 0.061, j*0.22);
      cabGroup.add(tile);
    }
  }
}
// 天花板 + 燈
const ceiling = new THREE.Mesh(new THREE.BoxGeometry(CAB_W, 0.06, CAB_D), matCabInt);
ceiling.position.y = CAB_H/2 - 0.03; cabGroup.add(ceiling);
const cabLight = new THREE.Mesh(new THREE.BoxGeometry(CAB_W*0.7, 0.04, CAB_D*0.7),
  new THREE.MeshStandardMaterial({ color: 0xfff5e0, emissive: 0xfff5e0, emissiveIntensity: 0.8 }));
cabLight.position.y = CAB_H/2 - 0.07; cabGroup.add(cabLight);
const cabBulb = new THREE.PointLight(0xfff5e0, 0.8, 5);
cabBulb.position.y = CAB_H/2 - 0.2; cabGroup.add(cabBulb);
// 後牆 + 左右牆（半透明，看得到內部）
const matWallSemi = new THREE.MeshStandardMaterial({ color: 0xe8eaef, metalness: 0.4, roughness: 0.5, transparent: true, opacity: 0.5, side: THREE.DoubleSide });

const ropeMat = new THREE.MeshStandardMaterial({ color: 0x6a6e76, metalness: 0.9, roughness: 0.4 });
const ropePool = [];  // 動態更新
function buildRope(x1, y1, z1, x2, y2, z2) {
  const dx = x2-x1, dy = y2-y1, dz = z2-z1;
  const len = Math.max(0.01, Math.sqrt(dx*dx + dy*dy + dz*dz));
  const r = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, len, 6), ropeMat);
  r.position.set((x1+x2)/2, (y1+y2)/2, (z1+z2)/2);
  // 對齊端點：以 Y 軸朝向計算
  const dir = new THREE.Vector3(dx, dy, dz).normalize();
  const up = new THREE.Vector3(0, 1, 0);
  const quat = new THREE.Quaternion().setFromUnitVectors(up, dir);
  r.quaternion.copy(quat);
  return r;
}
function rebuildRopes() {
  try {
    ropesGroup.clear();
    // 確保 world matrix 為最新
    ELEV.updateMatrixWorld(true);
    const sheaveY = machGroup.position.y;
    const sheaveX = 0.42;
    const cabTopY = cabGroup.position.y + CAB_H/2 + 0.18;  // anchor 在 cab top
    const cwTopY = cwGroup.position.y + 0.95;
    for (let i = 0; i < 8; i++) {
      const grooveX = sheaveX + (i - 3.5) * 0.025;
      // cab 側
      ropesGroup.add(buildRope(grooveX, sheaveY, -0.25, grooveX, cabTopY, -0.25));
      // cw 側
      ropesGroup.add(buildRope(grooveX, sheaveY, -SHAFT_D/2 + 0.3, grooveX, cwTopY, -SHAFT_D/2 + 0.3));
    }
  } catch (e) {
    console.error('rebuildRopes failed:', e);
  }
}
rebuildRopes();

ctrlWin.position.set(0, 0.05, 0.183); ctrlGroup.add(ctrlWin);

ctrlGroup.userData = { name:"Elevator Controller 控制盤", kind:"controller", desc:"電梯控制櫃 — VFD + CPU + 安全模組 + UPS", specs:[["VFD","KEB Combivert F6 11kW"],["CPU","Motion Controller"],["Safety","SIL-3 STO/SS1"],["UPS","30 min 備援"]] };

// ============ 11. Sensors ============
function addElevSensor(name, pos, desc, specs) {
  const g = new THREE.Group(); g.position.set(...pos);
  g.add(new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 0.1),
    new THREE.MeshStandardMaterial({ color: 0xa3e635, emissive: 0x52731c, emissiveIntensity: 0.7 })));
  g.userData = { name, kind:"sensor", desc, specs };
  ELEV.add(g);
}
addElevSensor("Top Limit 上限位",     [SHAFT_W/2 - 0.05, SHAFT_H - PIT_H - 0.4, -0.25], "頂端強制停止 NC", [["型式","Magnetic NC"]]);
addElevSensor("Bottom Limit 下限位",  [SHAFT_W/2 - 0.05, -PIT_H + 0.25, -0.25], "底端強制停止 NC", [["型式","Magnetic NC"]]);
addElevSensor("Encoder 編碼器",       [-0.4, SHAFT_H - PIT_H - 0.85, -0.25], "馬達絕對位置回授", [["型式","Heidenhain EBI 1135"]]);
addElevSensor("Door Zone 門區 1F",    [-SHAFT_W/2+0.05, FLOOR_Y[0] + 1.1, -0.25], "1F 樓層平層磁感應", [["精度","±3 mm"]]);
addElevSensor("Door Zone 門區 2F",    [-SHAFT_W/2+0.05, FLOOR_Y[1] + 1.1, -0.25], "2F 樓層平層磁感應", [["精度","±3 mm"]]);
addElevSensor("Door Zone 門區 3F",    [-SHAFT_W/2+0.05, FLOOR_Y[2] + 1.1, -0.25], "3F 樓層平層磁感應", [["精度","±3 mm"]]);

// ============ 12. Click 互動：高亮 + Specs ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const selectedEl = document.getElementById('selected');
let lastHighlight = null;
const origEmissive = new Map();

function findRoot(o) { while (o && !o.userData?.name) o = o.parent; return o; }
function highlight(root) {
  // 清除上次
  if (lastHighlight) {
    lastHighlight.traverse(o => {
      if (o.isMesh && origEmissive.has(o)) {
        const orig = origEmissive.get(o);
        o.material.emissive.setHex(orig.color);
        o.material.emissiveIntensity = orig.intensity;
      }
    });
    origEmissive.clear();
  }
  // 新高亮
  root.traverse(o => {
    if (o.isMesh && o.material.emissive) {
      origEmissive.set(o, { color: o.material.emissive.getHex(), intensity: o.material.emissiveIntensity });
      o.material.emissive.setHex(0xa3e635);
      o.material.emissiveIntensity = 0.5;
    }
  });
  lastHighlight = root;
}

canvas.addEventListener('click', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(scene.children, true);
  if (hits.length) {
    const root = findRoot(hits[0].object);
    if (root?.userData?.name) {
      // COP 按鈕特例：點 = 呼叫該樓
      if (root.userData.isCopBtn) {
        callFloor(root.userData.floor);
        // 視覺：按鈕變亮
        root.material.emissive.setHex(0xfbbf24);
        root.material.emissiveIntensity = 0.7;
        setTimeout(() => { root.material.emissiveIntensity = 0; }, 4000);
        return;
      }
      document.getElementById('sel-name').textContent = root.userData.name;
      document.getElementById('sel-desc').textContent = root.userData.desc || '';
      const specs = document.getElementById('sel-specs');
      while (specs.firstChild) specs.removeChild(specs.firstChild);
      (root.userData.specs || []).forEach(([k, v]) => {
        const r = document.createElement('div'); r.className = 'row';
        const sk = document.createElement('span'); sk.className = 'k'; sk.textContent = k;
        const sv = document.createElement('span'); sv.className = 'v'; sv.textContent = v;
        r.appendChild(sk); r.appendChild(sv); specs.appendChild(r);
      });
      highlight(root);
      selectedEl.classList.add('show');
      return;
    }
  }
  selectedEl.classList.remove('show');
});

// ============ 13. HUD 視角控制 ============
let exploded = false;
function setExplode(on) {
  exploded = on;
  const f = on ? 1 : 0;
  cabGroup.position.x = f * 3.5;
  cwGroup.position.x = -f * 3.0;
  machGroup.position.y = SHAFT_H - PIT_H - 1.0 + f * 2.5;
}
let shaftOn = true;
function setShaftVis(on) { shaftOn = on; Object.values(walls).forEach(w => w.visible = on); shaftEdges.visible = on; }
let cutaway = false;
function setCutaway(on) { cutaway = on; walls.front.visible = !on && shaftOn; }

document.querySelectorAll('.ctrl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const a = btn.dataset.action;
    if (a === 'explode') { setExplode(!exploded); btn.classList.toggle('active', exploded); }
    else if (a === 'shaft') { setShaftVis(!shaftOn); btn.classList.toggle('active', shaftOn); }
    else if (a === 'cutaway') { setCutaway(!cutaway); btn.classList.toggle('active', cutaway); }
    else if (a === 'reset') { camera.position.set(10, 7, 12); controls.target.set(0, 6, 0); }
  });
});
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'e') { setExplode(!exploded); document.querySelector('[data-action=explode]').classList.toggle('active', exploded); }
  else if (k === 's') { setShaftVis(!shaftOn); document.querySelector('[data-action=shaft]').classList.toggle('active', shaftOn); }
  else if (k === 'c') { setCutaway(!cutaway); document.querySelector('[data-action=cutaway]').classList.toggle('active', cutaway); }
  else if (k === 'r') { camera.position.set(10, 7, 12); controls.target.set(0, 6, 0); }
  else if (['1','2','3','4'].includes(k)) callFloor(parseInt(k)-1);
});

// ============ 14. 電梯運行邏輯 (狀態機) ============
const STATE = { IDLE:'idle', MOVING:'moving', LEVELING:'leveling', OPENING:'opening', OPEN:'open', CLOSING:'closing' };
let state = STATE.IDLE;
let queue = [];
let doorOpenTimer = 0;
const doorMaxOpen = CAB_W/2 - 0.05;
let doorOpenAmt = 0;
let cabVel = 0;
const cabMaxV = 0.025;  // per frame ≈ 1 m/s @ 60fps in unit scale

function statusText() {
  return { idle:'待機 IDLE', moving:'運行 MOVING', leveling:'平層 LEVEL', opening:'開門 OPENING', open:'門開 OPEN', closing:'關門 CLOSING' }[state];
}
function updateHUD() {
  document.getElementById('floorLCD').textContent = FLOOR_NAMES[cabFloor];
  const arrow = document.getElementById('dirArrow');
  const dir = cabVel > 0.001 ? '▲' : cabVel < -0.001 ? '▼' : '●';
  arrow.textContent = dir;
  arrow.className = 'arrow' + (dir === '●' ? ' idle' : '');
  const st = document.getElementById('carStatus');
  st.textContent = statusText();
  st.className = 'car-status ' + (state === STATE.MOVING || state === STATE.LEVELING ? 'running' :
                                  state === STATE.OPENING || state === STATE.CLOSING ? 'opening' :
                                  state === STATE.OPEN ? 'opening' : 'idle');
  drawFloorIndicator(FLOOR_NAMES[cabFloor], dir);
  // 樓層卡片 highlight
  document.querySelectorAll('.floor-row').forEach((r, i) => {
    r.classList.toggle('is-current', i === cabFloor);
  });
}

function callFloor(target) {
  if (target === cabFloor && state === STATE.IDLE) {
    // 已在該樓 → 直接開門
    state = STATE.OPENING; doorOpenTimer = 0;
    return;
  }
  if (target !== cabFloor && !queue.includes(target)) queue.push(target);
  if (state === STATE.IDLE) processQueue();
  // 對應按鈕亮起
  const btn = document.querySelector(`[data-floor="${target}"]`);
  if (btn) btn.classList.add('is-calling');
}
function processQueue() {
  if (!queue.length) return;
  const target = queue[0];
  if (target === cabFloor) { queue.shift(); processQueue(); return; }
  cabTargetY = FLOOR_Y[target] + CAB_FLOOR_OFFSET;
  state = STATE.MOVING;
}

// 樓層呼叫面板
const callList = document.getElementById('floorCallList');
FLOOR_NAMES.forEach((name, i) => {
  const row = document.createElement('div');
  row.className = 'floor-row' + (i === 0 ? ' is-current' : '');
  const lbl = document.createElement('span');
  lbl.className = 'lbl'; lbl.textContent = name;
  const btn = document.createElement('button');
  btn.className = 'floor-call-btn'; btn.textContent = '呼叫';
  btn.dataset.floor = i;
  btn.addEventListener('click', () => callFloor(i));
  row.appendChild(lbl); row.appendChild(btn);
  callList.appendChild(row);
});

// ============ 15. Animation Loop ============
const clock = new THREE.Clock();
let sheaveAngle = 0;
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  // 電梯狀態機
  if (state === STATE.MOVING) {
    const dy = cabTargetY - cabGroup.position.y;
    const dist = Math.abs(dy);
    if (dist < 0.04) {
      state = STATE.LEVELING;
      cabVel = 0;
    } else {
      // S-curve 簡化：距離大就全速
      const targetVel = Math.sign(dy) * Math.min(cabMaxV, dist * 0.4);
      cabVel = THREE.MathUtils.lerp(cabVel, targetVel, 0.06);
      cabGroup.position.y += cabVel;
      // 配重反向
      cwGroup.position.y -= cabVel;
      // sheave 轉
      sheaveAngle -= cabVel * 0.6 / 0.4;
      sheave.rotation.x = sheaveAngle;
      motorBody.rotation.x = sheaveAngle;
      brakeDisc.rotation.x = sheaveAngle;
      rebuildRopes();
    }
  } else if (state === STATE.LEVELING) {
    cabGroup.position.y = cabTargetY;
    cwGroup.position.y = FLOOR_Y[FLOORS-1] - cabTargetY + FLOOR_Y[0] + 1.5;
    cabVel = 0;
    cabFloor = FLOOR_Y.findIndex(y => Math.abs(y + CAB_FLOOR_OFFSET - cabTargetY) < 0.1);
    if (cabFloor === -1) cabFloor = 0;
    rebuildRopes();
    state = STATE.OPENING;
    doorOpenAmt = 0;
    // 該樓 hall 按鈕 reset
    const btn = document.querySelector(`[data-floor="${cabFloor}"]`);
    if (btn) btn.classList.remove('is-calling');
    queue.shift();
  } else if (state === STATE.OPENING) {
    doorOpenAmt = Math.min(doorMaxOpen, doorOpenAmt + 0.015);
    cabDoorL.position.x = -CAB_W/4 + 0.02 - doorOpenAmt;
    cabDoorR.position.x = CAB_W/4 - 0.02 + doorOpenAmt;
    // 同步該樓 landing door
    if (cabFloor < 3) {
      const ld = landingDoors[cabFloor];
      ld.L.position.x = ld.baseX_L - doorOpenAmt;
      ld.R.position.x = ld.baseX_R + doorOpenAmt;
    }
    if (doorOpenAmt >= doorMaxOpen) { state = STATE.OPEN; doorOpenTimer = 0; }
  } else if (state === STATE.OPEN) {
    doorOpenTimer += dt;
    if (doorOpenTimer >= 2.5) state = STATE.CLOSING;
  } else if (state === STATE.CLOSING) {
    doorOpenAmt = Math.max(0, doorOpenAmt - 0.012);
    cabDoorL.position.x = -CAB_W/4 + 0.02 - doorOpenAmt;
    cabDoorR.position.x = CAB_W/4 - 0.02 + doorOpenAmt;
    if (cabFloor < 3) {
      const ld = landingDoors[cabFloor];
      ld.L.position.x = ld.baseX_L - doorOpenAmt;
      ld.R.position.x = ld.baseX_R + doorOpenAmt;
    }
    if (doorOpenAmt <= 0) { state = STATE.IDLE; processQueue(); }
  }

  updateHUD();
  controls.update();
  renderer.render(scene, camera);
}
animate();

document.getElementById('loader').style.display = 'none';

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
